<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Contact Us</title>
	</head>
	<body>
		<nav>
			<a
				href="something.html?utm_source=google&utm_campaign=summer_promo&utm_medium=cpc&hello=wo
  rld"
				>Contact Us</a
			>
		</nav>

		<h2>Contact Us</h2>
		<p>Fill out the form below.</p>


		
<iframe id="pss-web-form"
	src="http://localhost:5500/api/public/web-form/45"
	frameborder="0"
	style="position: static; display: block;
	width: 100%; border: none; overflow: hidden;">
</iframe>

<script>
(function () {
	const PSS_ORIGIN = 'http://localhost:5500';
	const PSS_WEB_FORM_ID = 'pss-web-form';
	const SESSION_KEY = 'pss_referring_url_45';
	const TRACKING_KEYS = [
		// UTM (universal — all platforms)
		'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term',
		// Google Ads
		'gclid', 'gbraid', 'wbraid', 'gad_source',
		// Meta / Facebook / Instagram
		'fbclid',
		// Microsoft / Bing Ads
		'msclkid',
		// TikTok Ads
		'ttclid',
		// LinkedIn Ads
		'li_fat_id',
		// X / Twitter Ads
		'twclid',
		// Pinterest Ads
		'epik',
		// Snapchat Ads
		'ScCid',
		// Affiliate (Impact.com)
		'irclickid',
		// Email platforms (Marketo, HubSpot, Mailchimp)
		'mkt_tok', '_hsenc', 'mc_cid',
	];
	const EventAction = {
		SET_PSS_WEB_FORM_HEIGHT: 'SET_PSS_WEB_FORM_HEIGHT',
		PSS_WEB_FORM_REDIRECT: 'PSS_WEB_FORM_REDIRECT',
		SET_REFERRING_WEBSITE: 'SET_REFERRING_WEBSITE'
	};

	const getSession = (key) => {
		try { 
			return sessionStorage.getItem(key); 
		} catch(_e) { 
			return null; 
		}
	};

	const setSession = (key, value) => {
		try {
			sessionStorage.setItem(key, value);
		} catch(_e) {}
	};

	const params = new URLSearchParams(window.location.search);

	if (TRACKING_KEYS.some((k) => params.has(k))) {
		setSession(SESSION_KEY, window.location.href);
	}

	const initForm = () => {
		const iframe = document.getElementById(PSS_WEB_FORM_ID);

		if (!iframe) {
			return;
		}

		iframe.addEventListener('load', () => {
			if (!iframe.contentWindow) {
				return;
			}

			iframe.contentWindow.postMessage(
				{ action: EventAction.SET_REFERRING_WEBSITE, referringWebsite: getSession(SESSION_KEY) || document.referrer || window.location.href },
				PSS_ORIGIN
			);
		}, { once: true });

		window.addEventListener('message', (event) => {
			if (event.origin !== PSS_ORIGIN) {
				return;
			}

			switch (event.data?.action) {
				case EventAction.SET_PSS_WEB_FORM_HEIGHT: {
					iframe.style.height = (event.data.height + 30) + 'px';
					break;
				}
				case EventAction.PSS_WEB_FORM_REDIRECT: {
					window.location.href = event.data.redirectUrl;
					break;
				}
			}
		});
	};

	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', initForm);
	} else {
		initForm();
	}
})();
</script>

		
	</body>
</html>
