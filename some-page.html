<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Contact Us</title>
	</head>
	<body>
		<nav>
			<a
				href="something.html?utm_source=google&utm_campaign=summer_promo&utm_medium=cpc&hello=wo
  rld"
				>Contact Us</a
			>
		</nav>

		<h2>Contact Us</h2>
		<p>Fill out the form below.</p>

		<iframe id="pss-web-form" src="https://weeklytest.pavementsoft.net/api/public/web-form/45" frameborder="0" style="display: block; width: 100%; border: none; overflow: hidden;"> </iframe>

		<script>
			document.addEventListener('DOMContentLoaded', () => {
			  const iframe = document.getElementById('pss-web-form');

			  if (!iframe) return;

			  iframe.addEventListener('load', () => {
			    iframe.contentWindow.postMessage(
			      { action: 'SET_REFERRING_WEBSITE', referringWebsite: window.location.href },
			      'https://weeklytest.pavementsoft.net'
			    );
			  });

			  window.addEventListener('message', (event) => {
			    switch (event.data?.action) {
			      case 'SET_PSS_WEB_FORM_HEIGHT': {
			        iframe.style.height = (event.data.height + 30) + 'px';
			        break;
			      }
			      case 'PSS_WEB_FORM_REDIRECT': {
			        window.location.href = event.data.redirectUrl;
			        break;
			      }
			    }
			  });
			   });
		</script>
	</body>
</html>
